<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SparkAI</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet"/>
</head>
<body>

  <div class="auth-screen" id="authScreen">
    <div class="auth-card">
      <div class="auth-logo">
        <span>⚡</span>
        <span>SparkAI</span>
      </div>
      <p class="auth-tagline">Seu assistente criativo de projetos tech</p>

      <div class="auth-tabs">
        <button class="auth-tab active" id="tabLogin" onclick="mostrarTab('login')">Entrar</button>
        <button class="auth-tab" id="tabRegister" onclick="mostrarTab('register')">Criar conta</button>
      </div>

      <div class="auth-form" id="formLogin">
        <div class="field">
          <label>Username</label>
          <input type="text" id="loginUsername" placeholder="seu username" autocomplete="username"/>
        </div>
        <div class="field">
          <label>Senha</label>
          <input type="password" id="loginPassword" placeholder="••••••" autocomplete="current-password"/>
        </div>
        <div class="auth-erro" id="loginErro"></div>
        <button class="btn-auth" id="btnLogin">Entrar</button>
      </div>

      <div class="auth-form hidden" id="formRegister">
        <div class="field">
          <label>Username</label>
          <input type="text" id="regUsername" placeholder="escolha um username" autocomplete="username"/>
        </div>
        <div class="field">
          <label>Senha</label>
          <input type="password" id="regPassword" placeholder="mínimo 6 caracteres" autocomplete="new-password"/>
        </div>
        <div class="auth-erro" id="registerErro"></div>
        <button class="btn-auth" id="btnRegister">Criar conta</button>
      </div>
    </div>
  </div>

  <div class="chat-screen hidden" id="chatScreen">

    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <span class="logo-icon">⚡</span>
          <span class="logo-text">SparkAI</span>
        </div>
        <button class="btn-novo-chat" id="btnNovoChat">+ Novo chat</button>
      </div>
      <div class="sidebar-lista" id="listaSessoes"></div>
      <div class="sidebar-footer">
        <div class="user-info">
          <span class="user-name" id="userNameDisplay"></span>
          <button class="btn-logout" id="btnLogout">Sair</button>
        </div>
      </div>
    </aside>

    <button class="sidebar-toggle" id="sidebarToggle">☰</button>

    <main class="chat-main">
      <div class="chat-header">
        <span class="chat-titulo" id="chatTitulo">Novo chat</span>
        <span class="tokens-badge" id="tokensBadge"></span>
      </div>

      <div class="chat-mensagens" id="chatMensagens">
        <div class="boas-vindas" id="boasVindas">
          <div class="bv-icon">⚡</div>
          <h2>Olá! Sou o SparkAI</h2>
          <p>Seu assistente criativo para ideias de projetos tech.<br/>Me conta o que você quer criar!</p>
          <div class="sugestoes">
            <button class="sugestao-btn" data-msg="Tenho uma ideia de app de finanças pessoais, me ajuda a desenvolver?">💰 App de finanças</button>
            <button class="sugestao-btn" data-msg="Quero criar um jogo mobile casual, me dá uma ideia criativa">🎮 Ideia de jogo</button>
            <button class="sugestao-btn" data-msg="Preciso de uma ideia de site para portfólio de designer">🎨 Site portfólio</button>
            <button class="sugestao-btn" data-msg="Me sugere um projeto interessante para aprender programação">💡 Projeto para aprender</button>
          </div>
        </div>
      </div>

      <div class="chat-input-area">
        <div class="chat-input-wrapper">
          <textarea id="inputMensagem" placeholder="Me conta sua ideia..." rows="1"></textarea>
          <button class="btn-enviar" id="btnEnviar">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="M22 2L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
        <p class="input-hint">Enter para enviar · Shift+Enter para nova linha</p>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
